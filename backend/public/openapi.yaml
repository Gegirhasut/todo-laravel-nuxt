openapi: 3.0.3

info:
  title: API списка задач
  version: "1.0.0"
  description: |
    REST API приложения «Список задач».

    ## Авторизация

    Используются **bearer-токены Laravel Sanctum**. Вызовите
    `POST /api/auth/login` с тестовыми учётными данными и отправляйте
    полученный токен во всех остальных запросах:

    ```
    Authorization: Bearer <token>
    ```

    На этой странице можно нажать **Authorize**, вставить токен и сразу
    попробовать эндпоинты.

    ## Тестовые аккаунты

    | Роль  | Email               | Пароль     |
    | ----- | ------------------- | ---------- |
    | admin | `admin@example.com` | `password` |
    | user  | `user@example.com`  | `password` |

    ## Ошибки

    Любая ошибка возвращается в одном формате: поле `message`, а при ошибках
    валидации (422) — ещё и словарь `errors`.

servers:
  - url: http://localhost:8000
    description: Локальный сервер разработки

tags:
  - name: Auth
    description: Вход, выход и текущий пользователь.
  - name: Tasks
    description: CRUD задач, поиск, фильтрация, сортировка и пагинация.

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Войти и получить bearer-токен
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: password
      responses:
        "200":
          description: Успешная авторизация.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Токен Sanctum в открытом виде. Сохраните его и отправляйте как bearer-токен.
                    example: 3|Kj8xQ2mB7nP1sR4tV6wY9zA0cD5eF8gH2iJ3kL4m
                  user:
                    $ref: "#/components/schemas/User"
        "422":
          description: Не заполнены поля или неверные учётные данные.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
              example:
                message: Неверный email или пароль.
                errors:
                  email: ["Неверный email или пароль."]

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Отозвать токен текущего запроса
      responses:
        "200":
          description: Токен отозван. Остальные токены пользователя продолжают работать.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                message: Вы вышли из системы.
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/user:
    get:
      tags: [Auth]
      summary: Текущий авторизованный пользователь
      responses:
        "200":
          description: Текущий пользователь.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/tasks:
    get:
      tags: [Tasks]
      summary: Список задач
      description: |
        По умолчанию обычный пользователь видит только свои задачи. С
        `?scope=all` он видит задачи всех, но чужие доступны только для чтения.
        Администратор всегда видит все задачи.

        Поддерживаются поиск, фильтр по статусу, сортировка по разрешённым
        колонкам и пагинация.
      parameters:
        - name: search
          in: query
          description: Поиск по названию и описанию.
          schema:
            type: string
            maxLength: 255
          example: молоко
        - name: status
          in: query
          description: Фильтр по статусу.
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: scope
          in: query
          description: |
            `mine` — только свои задачи (по умолчанию), `all` — задачи всех
            пользователей. Для администратора параметр ничего не меняет.
          schema:
            type: string
            enum: [mine, all]
            default: mine
        - name: sort
          in: query
          description: Колонка сортировки. Задачи без срока всегда в конце.
          schema:
            type: string
            enum: [due_date, status, title, created_at]
            default: created_at
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Страница списка задач.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCollection"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationFailed"

    post:
      tags: [Tasks]
      summary: Создать задачу
      description: Владельцем задачи всегда становится авторизованный пользователь.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreTaskRequest"
      responses:
        "201":
          description: Созданная задача.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/TaskId"

    get:
      tags: [Tasks]
      summary: Получить одну задачу
      description: Доступно любому авторизованному пользователю.
      responses:
        "200":
          description: Задача.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Tasks]
      summary: Заменить задачу
      description: Доступно владельцу задачи и администратору.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreTaskRequest"
      responses:
        "200":
          description: Обновлённая задача.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"

    patch:
      tags: [Tasks]
      summary: Частично обновить задачу
      description: |
        Доступно владельцу задачи и администратору. Все поля необязательны,
        но проверяются, если переданы.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Обновлённая задача.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"

    delete:
      tags: [Tasks]
      summary: Удалить задачу
      description: Доступно владельцу задачи и администратору.
      responses:
        "200":
          description: Задача удалена.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                message: Задача удалена.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Токен в открытом виде, полученный из `POST /api/auth/login`.

  parameters:
    TaskId:
      name: id
      in: path
      required: true
      description: Идентификатор задачи.
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1

  schemas:
    TaskStatus:
      type: string
      enum: [pending, in_progress, completed]
      example: pending

    User:
      type: object
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          example: Обычный пользователь
        email:
          type: string
          format: email
          example: user@example.com
        role:
          type: string
          enum: [user, admin]
          example: user

    TaskOwner:
      type: object
      description: Присутствует, если владелец задачи был загружен.
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          example: Обычный пользователь
        email:
          type: string
          format: email
          example: user@example.com

    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          description: Владелец задачи.
          example: 2
        title:
          type: string
          minLength: 3
          maxLength: 255
          example: Купить молоко
        description:
          type: string
          nullable: true
          example: Цельное молоко, два литра.
        due_date:
          type: string
          format: date
          nullable: true
          example: "2026-08-01"
        status:
          $ref: "#/components/schemas/TaskStatus"
        created_at:
          type: string
          format: date-time
          example: "2026-07-01T09:30:00+00:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-07-01T09:30:00+00:00"
        owner:
          $ref: "#/components/schemas/TaskOwner"

    TaskEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Task"

    TaskCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        links:
          type: object
          properties:
            first:
              type: string
              nullable: true
            last:
              type: string
              nullable: true
            prev:
              type: string
              nullable: true
            next:
              type: string
              nullable: true
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        from:
          type: integer
          nullable: true
          example: 1
        last_page:
          type: integer
          example: 3
        path:
          type: string
          example: http://localhost:8000/api/tasks
        per_page:
          type: integer
          example: 10
        to:
          type: integer
          nullable: true
          example: 10
        total:
          type: integer
          example: 25

    StoreTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 255
          example: Купить молоко
        description:
          type: string
          nullable: true
          example: Цельное молоко, два литра.
        due_date:
          type: string
          format: date
          nullable: true
          example: "2026-08-01"
        status:
          allOf:
            - $ref: "#/components/schemas/TaskStatus"
          description: Если не передан, используется `pending`.

    UpdateTaskRequest:
      type: object
      description: Передавайте только те поля, которые нужно изменить.
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 255
          example: Купить овсяное молоко
        description:
          type: string
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        status:
          $ref: "#/components/schemas/TaskStatus"

    Message:
      type: object
      properties:
        message:
          type: string

    Error:
      type: object
      properties:
        message:
          type: string
          example: Ресурс не найден.

    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: Поле название обязательно для заполнения.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            title: ["Поле название обязательно для заполнения."]

  responses:
    Unauthenticated:
      description: Токен не передан, недействителен или истёк.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Требуется авторизация.

    Forbidden:
      description: Пользователь авторизован, но не является владельцем задачи и не администратор.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Недостаточно прав для выполнения этого действия.

    NotFound:
      description: Задача не найдена.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Ресурс не найден.

    ValidationFailed:
      description: Тело запроса или query-параметры не прошли валидацию.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"

    ServerError:
      description: Непредвиденная ошибка сервера.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Ошибка сервера.

security:
  - bearerAuth: []
